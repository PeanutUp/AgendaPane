name: Release

on:
  push:
    tags:
      - "*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const versions = JSON.parse(fs.readFileSync("versions.json", "utf8"));
          const tag = process.env.RELEASE_TAG;

          if (tag !== manifest.version || tag !== packageJson.version) {
            throw new Error(
              `Tag ${tag} must match manifest/package version ${manifest.version}/${packageJson.version}`,
            );
          }
          if (versions[tag] !== manifest.minAppVersion) {
            throw new Error(
              `versions.json must map ${tag} to ${manifest.minAppVersion}`,
            );
          }
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify release assets
        run: |
          test -s main.js
          test -s manifest.json
          test -s styles.css

      - name: Use name-based OIDC subject for Obsidian compatibility
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl --fail-with-body --silent --show-error --location \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${REPOSITORY}/actions/oidc/customization/sub" \
            --data '{"use_default":false,"include_claim_keys":["repo","context"],"use_immutable_subject":false}'

          configuration="$(curl --fail-with-body --silent --show-error --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${REPOSITORY}/actions/oidc/customization/sub")"

          OIDC_CONFIGURATION="${configuration}" node <<'NODE'
          const configuration = JSON.parse(process.env.OIDC_CONFIGURATION);
          const expectedPrefix = `repo:${process.env.REPOSITORY}`;

          if (configuration.sub_claim_prefix !== expectedPrefix) {
            throw new Error(
              `Expected OIDC subject prefix ${expectedPrefix}, received ${configuration.sub_claim_prefix}`,
            );
          }
          NODE

      - name: Attest release assets
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            main.js
            manifest.json
            styles.css
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
